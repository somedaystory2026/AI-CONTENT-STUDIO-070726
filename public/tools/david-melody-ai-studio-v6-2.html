  const cleanSunoLyricsOnly = (rawText) => {

      let l = line.trimEnd();

      return l.replace(/^\s*#{1,6}\s+/, '').replace(/^\s*\*{0,2}(\[[^\]]+\])\*{0,2}\s*$/, '$1');
